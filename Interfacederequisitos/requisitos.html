<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ReqManager</title>
    <link rel="stylesheet" href="requisitos.css">
</head>
<body>
    <form id="formRequisito">
        <h2>Cadastro de Requisito</h2> 
        <label for="titulo">Título</label>
        <input type="text" id="titulo" name="titulo" placeholder="Ex: Cadastro de usuário" required>
        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" placeholder="Descreva o requisito" required></textarea> 
        <label for="tipo">Classificação</label>
        <select id="tipo" name="tipo" required>
            <option value="">Selecione</option>
            <option value="funcional">Funcional</option>
            <option value="nao-funcional">Não Funcional</option>
        </select>
        <label>Prioridade</label>
        <input type="radio" name="prioridade" value="baixa" required> Baixa<br>
        <input type="radio" name="prioridade" value="media"> Média<br>
        <input type="radio" name="prioridade" value="alta"> Alta
        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="aberto">Aberto</option>
            <option value="desenvolvimento">Em desenvolvimento</option>
            <option value="concluido">Concluído</option>
        </select> 
        <button type="submit">CADASTRAR</button>
        <p id="mensagem"></p>
    <div class="nav-buttons">
        <button type="button">⬅ Voltar</button>
        <button type="button">Próxima ➡</button>
    </div>
</form>
    </form>
    <div id="historicoTemp"></div>
    <script src="requisitos.js"></script>
</body>
</body>
</html>
